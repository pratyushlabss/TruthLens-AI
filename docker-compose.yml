version: '3.8'

services:
  # Frontend - Next.js application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: truthlens-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - truthlens-network
    restart: unless-stopped

  # Backend - Flask API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truthlens-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - BACKEND_PORT=${BACKEND_PORT:-5000}
      - HF_TOKEN=${HF_TOKEN}
      - PINECONE_KEY=${PINECONE_KEY}
      - SCRAPER_KEY=${SCRAPER_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@postgres:5432/truthlens_db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
    networks:
      - truthlens-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  truthlens-network:
    driver: bridge

volumes:
  backend-uploads:
    driver: local
