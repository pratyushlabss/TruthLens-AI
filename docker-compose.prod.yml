version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truthlens-api
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Core Settings
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HOST: "0.0.0.0"
      PORT: 8000

      # Database
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data.db}
      
      # API Keys (use .env file)
      HF_TOKEN: ${HF_TOKEN:-}
      PINECONE_KEY: ${PINECONE_KEY:-}
      PINECONE_REGION: ${PINECONE_REGION:-us-east-1}
      SCRAPER_KEY: ${SCRAPER_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    
    volumes:
      - ./backend:/app
      - truthlens-data:/app/data
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    networks:
      - truthlens-network
    
    # Resource limits to prevent OOM issues
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: truthlens-web
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: ${ENV:-production}
    
    depends_on:
      backend:
        condition: service_healthy
    
    restart: unless-stopped
    networks:
      - truthlens-network
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

volumes:
  truthlens-data:
    driver: local

networks:
  truthlens-network:
    driver: bridge
